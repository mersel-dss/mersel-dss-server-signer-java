name: Docker Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install local dependencies
        run: mvn validate -B

      - name: Build and test
        run: mvn clean verify -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 14

  docker:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push (main / develop) -> :main, :develop
            type=ref,event=branch
            # Tag push (v0.5.1) -> :0.5.1 + :0.5
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Default branch push (main) -> :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Her event türü için commit-bazlı traceability tag'i (örn. :sha-b66b915).
            # Önceki "prefix={{branch}}-" konfigürasyonu tag push'unda boş expand
            # edildiğinden ":-b66b915" gibi geçersiz referans üretip buildx'i
            # düşürüyordu — sabit "sha-" prefix'i tüm event'lerde geçerli.
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./devops/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Smoke test
        env:
          # metadata-action'ın belirlediği "primary" tag-only kısmı: branch
          # push'unda :main / :develop, tag push'unda :0.5.1, default-branch
          # push'unda :latest. Sabit ":main" yerine bunu kullanarak smoke
          # test'i her event'te otomatik doğru imaja yönlendiriyoruz.
          SMOKE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: |
          echo "Smoke test image: $SMOKE_IMAGE"
          docker pull "$SMOKE_IMAGE"
          docker run --rm -d \
            --name sign-api-smoke \
            -p 8085:8085 \
            "$SMOKE_IMAGE"

          echo "Waiting for application startup..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8085/actuator/health > /dev/null 2>&1; then
              echo "Health check passed!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Health check timed out"
              docker logs sign-api-smoke
              docker stop sign-api-smoke
              exit 1
            fi
            sleep 2
          done

          docker stop sign-api-smoke

  # ---------------------------------------------------------------------------
  # NOT: NuGet client (.NET) yayını için bkz. nuget.yml — aynı 'v*' tag'inde
  # paralel olarak tetiklenir. İki workflow birbirinden bağımsızdır.
  # ---------------------------------------------------------------------------
