name: Integration Tests

# Bu workflow, default 'mvn test' tarafından dışlanan ağır entegrasyon
# testlerini koşturur. Native bağımlılık (SoftHSM2 / Docker) gerektirdiği için
# ana CI'dan ayrı bir job dosyasında tutuluyor.
#
# Job'lar:
#   - verifier-e2e: 277 imzala-doğrula roundtrip testi:
#       - 20 CAdES (5 PFX × 2 backend × 2 mode: attached/detached)
#       -  7 CAdES binary fixture çeşitliliği (CAdESBinaryFixturesE2ETest):
#                    5 positive (sample.txt UTF-8 + sample.bin random +
#                    utf16-text + zip-archive + docx-sample) + 1 empty
#                    input contract + 1 large-10mb conditional. Tek RSA
#                    PFX × JCA backend (smart matrix — key-tipi
#                    çeşitliliği zaten CAdESSignAndVerifyE2ETest'te).
#                    LARGE fixture .gitignore'da; CI default'unda
#                    Assumption skip — generate etmek için job step
#                    eklenebilir.
#       - 10 PAdES (5 PFX × 2 backend)
#       -  8 PAdES PDF yapısal fixture (PAdESDocumentFixturesE2ETest):
#                    5 positive (with-form-fields + with-attachment +
#                    turkish-chars + landscape-a3 + scan-image-only) +
#                    1 cosign (already-signed.pdf'e ikinci imza,
#                    appendMode=true) + 1 encrypted contract (user-password
#                    PDF için davranış dokümante) + 1 large-50pages
#                    conditional. Tek RSA PFX × JCA backend (smart matrix
#                    — yapı, key-tipinden bağımsız). LARGE fixture
#                    .gitignore'da. Fixture'lar PdfFixtureGenerator
#                    (manuel test class) ile iText 5 üzerinden üretilir.
#       -  1 VerifierContainerSmokeTest (container ayağa kalktı sanity)
#       - 130 XAdES (5 PFX × 2 backend × 12 fixture UBL/EArchive/HR-XML/
#                    large/BOM/mixed-newlines/CDATA/comments/foreign-ns/
#                    unicode-emoji = 120 + 10 generic OtherXmlDocument):
#                    tüm production XML varyasyonları + signer'ın c14n/
#                    parsing/namespace/encoding regresyon vektörleri.
#                    Tek source-of-truth = XadesDocumentFixture; mixed/
#                    CDATA/comments/foreign-ns/emoji fixture'ları
#                    scripts/generate-xades-fixture-variants.py ile
#                    efatura.xml'den deterministic üretilir.
#       - 90 WS-Security ana suite (5 PFX × 2 backend × 9 SOAP envelope:
#                    baseline 1.1/1.2 + GİB e-Fatura + WS-Addressing +
#                    mevcut wsu:Id + multi-body + ~50KB large + MTOM/XOP +
#                    mevcut Security header). Lokal javax.xml.crypto.
#                    XMLSignature ile doğrulanır (DSS jenerik validator WSS
#                    KeyInfo→STR→BST resolve edemiyor; verifier-api bypass).
#       -  3 WS-Security davranış kontratı (RSA PFX × JCA, structural):
#                    Body wsu:Id override, WS-Addressing preservation,
#                    Security append-not-overwrite. PFX/backend matrislemesi
#                    yok — kontrat XML davranışı, key-tipinden bağımsız.
#       -  6 NEGATIF testler (sign+tamper+verify-must-fail):
#          * 3 XAdES (XAdESNegativeE2ETest): wrap-attack, tampered-after-sign,
#            signature-value bit-flip — runtime sign + DOM mutation.
#          * 1 PAdES (PAdESTamperedE2ETest): ByteRange içinde byte flip.
#          * 1 CAdES (CAdESTamperedE2ETest): detached payload byte flip.
#          * 1 XAdES SHA-1 legacy (XAdESSha1LegacyE2ETest): üçüncü-taraf
#            SHA-1 imzalı belge verifier policy'sinde reject veya warn.
#          Hepsi tek RSA PFX × JCA backend — tamper davranışı XML/PDF-level,
#          key-tipinden bağımsız.
#     Native PKCS#11 yok, sadece Docker yeter (Testcontainers
#     verifier-api container'ını ayağa kaldırır; WS-Security alt-suite'i
#     Docker'a bağımlı değildir).
#     **Verifier image stratejisi**: GHCR `:main` tag'i kullanılır; eğer
#     repo'nun signer-strict policy mimarisini içeren versiyon GHCR'a henüz
#     push edilmemişse, workflow_dispatch'ten `verifier_image_source=build`
#     seçilerek sibling repo'dan source build yapılabilir. Default
#     `auto`: PR/scheduled koşumlarında GHCR'dan, manuel tetiklemede tercihe
#     göre.
#
#   - pkcs11-integration: SoftHSM2 + OpenSC + Docker kullanarak iki test sınıfını
#     birden koşturur (her ikisinin de @Tag("pkcs11-integration") etiketi var):
#       1) SoftHsm2Pkcs11IntegrationTest        → 5 parametrize iterasyon
#          (raw imza, her PfxTestKey için)
#       2) XadesSoftHsmVerifierE2ETest          → 25 parametrize iterasyon
#          (5 PFX × 5 XAdES fixture, gerçek HSM + DSS verifier API roundtrip)
#     ubuntu-latest runner'da Docker zaten mevcut → Testcontainers ile
#     verifier-api container'ı otomatik ayağa kalkar.

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  # Nightly: regression'ı erken yakala (kütüphane güncellemeleri vs.).
  schedule:
    - cron: '0 3 * * *'   # her gün 03:00 UTC
  workflow_dispatch:        # manuel tetikleme
    inputs:
      verifier_image_source:
        description: 'verifier-api image kaynağı'
        required: false
        default: 'ghcr'
        type: choice
        options:
          - ghcr    # ghcr.io/mersel-dss/mersel-dss-verifier-api-java:main (default)
          - build   # sibling repo'dan checkout + docker build (henüz push edilmemiş fix'leri test ederken)

# Aynı branch'e ardışık push'larda yarışı önle.
concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # verifier-e2e: 277 sign+verify roundtrip test:
  #    20 = CAdES (5 PFX × 2 backend × 2 mode)         → verifier-api Docker
  #     7 = CAdES binary fixture çeşitliliği (CAdESBinaryFixturesE2ETest):
  #         5 positive (sample.txt + sample.bin + utf16-text + zip-archive
  #         + docx-sample) — fixture'lar
  #         resources/test-fixtures/cades/ altında deterministic üretilir
  #         (scripts/generate-cades-fixtures.py). + 1 empty input contract
  #         test (signer'ın 0-byte davranışını dokümante eder, build
  #         kırıcı değil). + 1 LARGE 10MB perf test (.gitignore;
  #         Assumption ile skip — CI'da generate etmek için ek step
  #         eklenebilir).
  #    10 = PAdES (5 PFX × 2 backend)                  → verifier-api Docker
  #     8 = PAdES PDF yapısal fixture (PAdESDocumentFixturesE2ETest):
  #         5 positive (with-form-fields, with-attachment, turkish-chars,
  #         landscape-a3, scan-image-only) + 1 cosign (already-signed.pdf
  #         + appendMode=true → ≥2 valid signature) + 1 encrypted contract
  #         (user-password PDF → davranış log'lanır, build kırıcı değil)
  #         + 1 large-50pages perf (conditional; LARGE fixture .gitignore'da,
  #         yoksa Assumption.skip). Fixture'lar PdfFixtureGenerator manuel
  #         test class'ı ile iText 5 üzerinden üretilir.
  #     1 = VerifierContainerSmokeTest                 → container health
  #   130 = XAdES — ana suite, tek matrix:
  #         5 PFX × 2 backend × {12 fixture: UBL e-Fatura/e-İrsaliye/
  #         e-Müstahsil/EArchive/HR-XML/Large/BOM/mixed-newlines/CDATA/
  #         comments/foreign-ns-prefix/unicode-emoji = 120} + 10 generic
  #         OtherXmlDocument. Tek source-of-truth = XadesDocumentFixture;
  #         5 yeni varyant (mixed-newlines, CDATA, comments, foreign-ns,
  #         emoji) scripts/generate-xades-fixture-variants.py ile
  #         efatura.xml'den deterministic üretilir.
  #    90 = WS-Security ana matrix:
  #         5 PFX × 2 backend × 9 SOAP envelope (2 baseline + 4 production
  #         parity + 3 contract) → lokal javax.xml.crypto.XMLSignature
  #         (verifier-api WSS-aware değil; DSS jenerik validator key-info
  #         içinde STR→BST'yi resolve edemiyor. Detay
  #         WsSecurityLocalXmlDsigVerifier sınıf Javadoc'unda.)
  #     3 = WS-Security davranış kontratları (RSA PFX × JCA, structural):
  #         WsSecurityContractE2ETest → wsu:Id override (security-critical),
  #         WS-Addressing preservation, Security append-not-overwrite.
  #     6 = Negatif testler (sign+tamper+verify-must-fail):
  #         XAdESNegativeE2ETest (3: wrap-attack, tampered-after-sign,
  #         signature-value bit-flip) + PAdESTamperedE2ETest (1: ByteRange
  #         byte flip) + CAdESTamperedE2ETest (1: detached payload byte flip)
  #         + XAdESSha1LegacyE2ETest (1: SHA-1 imzalı XAdES policy reject
  #         veya warning beklentisi). Tüm negatif testler tek RSA PFX × JCA
  #         backend — tamper davranışı XML/PDF-level, key-tipinden bağımsız.
  # Native PKCS#11 gerektirmez; PfxBackedPkcs11Signer ile simulated HSM
  # üzerinden de imzalama yapar. Internet bağlantısı zorunlu (verifier
  # online OCSP/CRL + KamuSM root XML deposu için).
  # ─────────────────────────────────────────────────────────────────────
  verifier-e2e:
    name: Verifier E2E (sign + verify roundtrip)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout signer
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Verify Docker daemon available (Testcontainers prereq)
        run: |
          set -euo pipefail
          docker info > /dev/null
          docker version --format 'docker {{.Client.Version}} / engine {{.Server.Version}}'

      # ────────────────────────────────────────────────────────────────
      # Verifier image: ya GHCR'dan çek (production-like), ya da sibling
      # repo'dan source build et. Source build seçeneği henüz GHCR'a
      # yayınlanmamış fix'leri test etmek için kritik (örn. bir PR'da
      # hem signer hem verifier tarafında değişiklik varsa).
      # ────────────────────────────────────────────────────────────────
      - name: Resolve verifier image source
        id: image_source
        run: |
          set -euo pipefail
          # Default: scheduled/PR/push → GHCR. workflow_dispatch input'u override eder.
          source="${{ github.event.inputs.verifier_image_source || 'ghcr' }}"
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "→ Verifier image source: $source"

      - name: Checkout verifier (source build path)
        if: steps.image_source.outputs.source == 'build'
        uses: actions/checkout@v4
        with:
          repository: mersel-dss/mersel-dss-verifier-api-java
          path: .verifier-src
          ref: main

      - name: Build verifier image (source build path)
        if: steps.image_source.outputs.source == 'build'
        run: |
          set -euo pipefail
          cd .verifier-src
          docker build \
            --tag mersel-dss-verifier-api:ci-local \
            --file devops/docker/Dockerfile \
            .
          docker image inspect mersel-dss-verifier-api:ci-local --format 'built {{.Id}}'

      - name: Run verifier-e2e suite
        env:
          # GHCR path → upstream image, build path → lokal build
          VERIFIER_IMAGE: ${{ steps.image_source.outputs.source == 'build' && 'mersel-dss-verifier-api:ci-local' || 'ghcr.io/mersel-dss/mersel-dss-verifier-api-java:main' }}
        run: |
          set -euo pipefail
          echo "Using verifier image: $VERIFIER_IMAGE"
          mvn test -B \
            -Dgroups=verifier-e2e \
            -DexcludedGroups= \
            -DverifierImage="$VERIFIER_IMAGE"

      # KRİTİK: 277 testin gerçekten koştuğunu doğrula. Image pull/build
      # başarısızlığında Testcontainers init hatası verir, surefire raporu
      # belki hiç oluşmaz veya 0 test gösterir; bu durumu sessiz "yeşil"
      # olarak bırakmayalım.
      #
      # Breakdown:
      #   VerifierContainerSmokeTest          1
      #   CAdESSignAndVerifyE2ETest          20 (5 PFX × 2 backend × 2 mode)
      #   CAdESBinaryVariationsE2ETest        8 (4 fixture × ATTACHED + 4 fixture × DETACHED)
      #   PAdESSignAndVerifyE2ETest          10 (5 PFX × 2 backend)
      #   PAdESDocumentVariationsE2ETest      4 (1 PFX × 1 backend × 4 PDF fixture)
      #   PAdESRuntimeScenariosE2ETest        4 (cosign + encrypted + form-fields + attachment)
      #   XAdESSignAndVerifyE2ETest         130 (5 PFX × 2 backend × 12 fixture + 10 generic)
      #   WsSecuritySignAndLocalVerifyE2ETest 90 (5 PFX × 2 backend × 9 SOAP envelope)
      #   WsSecurityContractE2ETest           3 (structural kontrat, key-agnostic)
      #   WsSecurityConcurrencyContractTest   1 (10 paralel WSS imzası)
      #   XAdESNegativeE2ETest                3 (wrap-attack + tamper + sig-flip)
      #   PAdESTamperedE2ETest                1 (byte-range tamper)
      #   CAdESTamperedE2ETest                1 (detached payload tamper)
      #   XAdESSha1LegacyE2ETest              1 (legacy SHA-1 crypto policy)
      #                                    ────
      #                                     277
      - name: Verify expected verifier-e2e test count
        run: |
          set -euo pipefail
          # NUL-separated find+xargs: boşluklu/non-ASCII dosya adlarına güvenli.
          total=$(find target/surefire-reports \
                    -name 'TEST-io.mersel.dss.signer.api.e2e.verifier.*.xml' \
                    -print0 2>/dev/null \
            | xargs -0 grep -hoE 'tests="[0-9]+"' \
            | grep -oE '[0-9]+' \
            | awk '{s+=$1} END {print s+0}')
          expected=277
          echo "Run total: $total (expected: $expected)"
          if [ "$total" -lt "$expected" ]; then
            echo "❌ Beklenen en az $expected verifier-e2e testi koşmadı (gerçek: $total)"
            echo "   Bu, verifier image'ın ayağa kalkmadığı veya tag filter'ın bozulduğu sinyali."
            ls -la target/surefire-reports/ 2>/dev/null || true
            exit 1
          fi
          echo "✅ verifier-e2e: $total iterasyon koştu"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-e2e-reports
          path: target/surefire-reports/
          retention-days: 14

  pkcs11-integration:
    name: PKCS#11 Integration (SoftHSM2 + Verifier API)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Install SoftHSM2 and OpenSC
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends softhsm2 opensc

      - name: Verify native dependencies
        run: |
          set -euo pipefail
          which softhsm2-util
          which pkcs11-tool
          softhsm2-util --version
          pkcs11-tool --version
          echo "--- libsofthsm2 lokasyonu ---"
          ls -la /usr/lib/softhsm/ 2>/dev/null || true
          ls -la /usr/lib/x86_64-linux-gnu/softhsm/ 2>/dev/null || true

      - name: Install local Maven dependencies
        run: mvn validate -B

      - name: Verify Docker daemon available (Testcontainers prereq)
        run: |
          set -euo pipefail
          docker info > /dev/null
          docker version --format 'docker {{.Client.Version}} / engine {{.Server.Version}}'

      - name: Run PKCS#11 integration tests (raw signing + XAdES E2E)
        env:
          # Native modül yolunu explicit veriyoruz; testin auto-discovery'si
          # bu path'i de tarıyor ama explicit olunca log daha net.
          SOFTHSM2_MODULE: /usr/lib/softhsm/libsofthsm2.so
          # Testcontainers verifier-api image pull'unu hızlandır (parallel layer fetch).
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: |
          # Tag-based filter. İki test class'ı da @Tag("pkcs11-integration")
          # taşıdığı için tek mvn çağrısında her ikisi de koşar:
          #   - SoftHsm2Pkcs11IntegrationTest        (5 raw sign iterasyonu)
          #   - XadesSoftHsmVerifierE2ETest          (25 E2E iterasyon)
          # -Dtest filter parametrize testlerde Surefire 2.22.2 ile sorunlu.
          mvn test -B \
            -Dgroups=pkcs11-integration \
            -DexcludedGroups=

      # KRİTİK: Native araç / Docker eksikliği yüzünden testlerin sessizce
      # skip olup workflow'un yine de "yeşil" görünmesi gerçek bir regression
      # riskidir. Aşağıdaki adım her bir test sınıfının beklenen iterasyon
      # sayısında gerçekten koştuğunu explicit doğrular.
      - name: Verify SoftHsm2Pkcs11IntegrationTest (6 raw signing iterations)
        run: |
          set -euo pipefail
          report="target/surefire-reports/io.mersel.dss.signer.api.services.keystore.iaik.SoftHsm2Pkcs11IntegrationTest.txt"
          if [ ! -f "$report" ]; then
            echo "❌ Surefire raporu bulunamadı: $report"
            ls -la target/surefire-reports/ 2>/dev/null || true
            exit 1
          fi
          echo "===== $report ====="
          cat "$report"
          echo "==================="

          # 5 PfxTestKey değeri × 1 parametrize sign + 1 H1 paralel sign kontrat testi.
          expected=6
          actual_run=$(grep -oE 'Tests run: [0-9]+' "$report" | head -1 | grep -oE '[0-9]+' || echo "0")
          actual_skipped=$(grep -oE 'Skipped: [0-9]+' "$report" | head -1 | grep -oE '[0-9]+' || echo "0")

          if [ "$actual_run" != "$expected" ]; then
            echo "❌ Beklenen: $expected (5 sequential + 1 paralel) sign iterasyonu, Gerçek: $actual_run"
            exit 1
          fi
          if [ "$actual_skipped" != "0" ]; then
            echo "❌ $actual_skipped test atlandı; softhsm2-util / pkcs11-tool / libsofthsm2 eksik?"
            exit 1
          fi
          echo "✅ SoftHsm2Pkcs11IntegrationTest: $expected iterasyon, hepsi koştu"

      - name: Verify XadesSoftHsmVerifierE2ETest (25 HSM+verifier iterations)
        run: |
          set -euo pipefail
          report="target/surefire-reports/io.mersel.dss.signer.api.e2e.verifier.XadesSoftHsmVerifierE2ETest.txt"
          if [ ! -f "$report" ]; then
            echo "❌ Surefire raporu bulunamadı: $report"
            ls -la target/surefire-reports/ 2>/dev/null || true
            exit 1
          fi
          echo "===== $report ====="
          cat "$report"
          echo "==================="

          expected=25  # 5 PfxTestKey × 5 XadesDocumentFixture
          actual_run=$(grep -oE 'Tests run: [0-9]+' "$report" | head -1 | grep -oE '[0-9]+' || echo "0")
          actual_skipped=$(grep -oE 'Skipped: [0-9]+' "$report" | head -1 | grep -oE '[0-9]+' || echo "0")

          if [ "$actual_run" != "$expected" ]; then
            echo "❌ Beklenen: $expected HSM+verifier iterasyonu, Gerçek: $actual_run"
            echo "   (5 PfxTestKey × 5 XadesDocumentFixture = 25)"
            exit 1
          fi
          if [ "$actual_skipped" != "0" ]; then
            echo "❌ $actual_skipped test atlandı; Docker veya SoftHSM eksik olabilir."
            exit 1
          fi
          echo "✅ XadesSoftHsmVerifierE2ETest: $expected iterasyon, hepsi koştu"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pkcs11-integration-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Print failed test bodies (for quick triage)
        if: failure()
        run: |
          set +e
          for f in target/surefire-reports/*.txt; do
            if grep -q "FAILED\|ERROR\|Skipped: [1-9]" "$f" 2>/dev/null; then
              echo "===================== $f ====================="
              cat "$f"
            fi
          done
