# Server Configuration
server.port=${SERVER_PORT:8085}

# OpenAPI Configuration (Scalar UI)
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Test-only endpoint kill-switch
# /v1/testusercountersign (GİB test ortamı counter-signature) bean'ini kontrol eder.
# Geriye dönük uyumluluk için VARSAYILAN AÇIK'tır (property verilmezse endpoint aktif).
# PRODUCTION ortamlarında 'false' yapılması ŞİDDETLE ÖNERİLİR — bean hiç
# oluşturulmaz ve endpoint 404 döner.
mersel.signer.test-endpoints.enabled=${TEST_ENDPOINTS_ENABLED:true}

# Logging Configuration
logging.config=classpath:logback-spring.xml
logging.file.path=${LOG_PATH:./logs}
logging.level.root=${LOG_LEVEL:INFO}
logging.level.io.mersel.dss.signer.api=${LOG_LEVEL:INFO}

# Application Info
spring.application.name=mersel-dss-signer-api
info.app.name=Mersel DSS Signer API
info.app.description=Dijital Imza Servisi API
info.app.version=@project.version@

# CORS Configuration
# Production ortamında spesifik domain'ler kullanın
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.max-age=${CORS_MAX_AGE:3600}

# Actuator Configuration
# 'pkcs11bridge' yalnızca remote PKCS#11 köprüsü aktifken oluşur (Remote koşulu);
# in-process / PFX kurulumlarında bean yoktur, uç 404 döner. Salt-okunur teşhis.
management.endpoints.web.exposure.include=health,info,prometheus,metrics,pkcs11bridge
management.health.defaults.enabled=true
management.info.env.enabled=true
# Default 'never' olduğundan /actuator/health yalnız özet {"status":"UP"} döner.
# 'always' ile components kırılımı (diskSpace, ping, remote modda pkcs11Bridge) görünür.
# Güvenlik için gerekirse HEALTH_SHOW_DETAILS=never (veya when_authorized) ile kapatın.
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:always}

# Prometheus Metrics Configuration
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}
# İmza iş metrikleri (SignatureMetrics): süre histogramı + doğrudan percentile
# serileri. Boyut dağılımının (signer_document_bytes / signer_signed_bytes)
# SLO kovaları kod tarafında (SignatureMetrics) tanımlıdır; burada süre için
# ek client-side percentile yayınlanır (Grafana'da histogram_quantile'a alternatif).
management.metrics.distribution.percentiles-histogram.signer.signature.duration=true
management.metrics.distribution.percentiles.signer.signature.duration=0.5,0.95,0.99

# ============================================
# Keystore Configuration (Environment Variables)
# ============================================
# Aşağıdaki yapılandırmalar environment variable olarak verilmelidir.
# Örnek: export PKCS11_LIBRARY=/path/to/library.so

# --- PKCS#11 (HSM) Yapılandırması (Örnek) ---
# PKCS11_LIBRARY=/usr/local/lib/libakisp11.dylib
# PKCS11_SLOT=0
# CERTIFICATE_PIN=your-hsm-pin
# CERTIFICATE_SERIAL_NUMBER=your-serial-number

# --- PKCS#11 Köprü (Out-of-Process Helper) Yapılandırması ---
# JVM ile PKCS#11 DLL'inin bit'liği uyuşmadığında (örn. 64-bit JVM + yalnızca
# 32-bit'i bulunan mali mühür / akıllı kart DLL'i) native kütüphane ana
# process'e JNI ile YÜKLENEMEZ (UnsatisfiedLinkError). Bu durumda sistem
# otomatik olarak DLL'i kendi bit'liğinde yükleyen ayrı bir "helper" JVM
# başlatır ve imza çağrılarını loopback IPC ile ona iletir.
#
# Önemli: Ağır DSS belge işleme (200MB'a kadar multipart, XAdES DOM ağaçları)
# 64-bit ANA process'te kalır; köprüden yalnızca digest + imza baytları geçer.
# Bu yüzden 32-bit helper'ın dar (~2GB) adres alanı / "Java Heap Space" sorunu
# pratikte ortadan kalkar — helper'a -Xmx256m fazlasıyla yeter.
#
# PKCS11_BRIDGE_MODE: auto (default; bit'lik karşılaştır), in-process, remote
# PKCS11_BRIDGE_MODE=auto
#
# Remote moda düşüldüğünde ZORUNLU: DLL'in bit'liğine uygun bir java yolu
# (örn. 32-bit DLL için 32-bit JRE'nin java.exe'si):
# PKCS11_HELPER_JAVA=C:\\Program Files (x86)\\Java\\jre1.8.0_xxx\\bin\\java.exe
#
# Helper JVM argümanları (boşlukla ayrılmış). Default dar heap:
# PKCS11_HELPER_JVM_OPTS=-Xmx256m
#
# Helper classpath'i. Boşsa ana process'in java.class.path'i (fat-jar) kullanılır:
# PKCS11_HELPER_CLASSPATH=
#
# Helper başlatma yöntemi: auto (fat-jar → PropertiesLauncher) | propertieslauncher | direct
# PKCS11_HELPER_LAUNCHER=auto
#
# Loopback bind host'u (helper + client). Güvenlik için loopback'te kalmalı:
# PKCS11_BRIDGE_HOST=127.0.0.1
#
# Timeout'lar (ms):
# PKCS11_HELPER_READY_TIMEOUT_MS=30000     # helper'ın READY vermesi için
# PKCS11_HELPER_CONNECT_TIMEOUT_MS=5000    # helper'a bağlanma
# PKCS11_HELPER_READ_TIMEOUT_MS=60000      # yanıt okuma (HSM round-trip + reinit penceresi)

# --- PFX Dosyası Yapılandırması ---
# PFX_PATH=/path/to/certificate.pfx
# CERTIFICATE_PIN=your-password

# --- Sertifika Seçimi (İsteğe Bağlı) ---
# Keystore içinde birden fazla sertifika varsa seçim yapabilirsiniz:
#
# Yöntem 1: Alias ile seçim (önerilen, hızlı erişim)
#
# Yöntem 2: Serial number ile seçim (hexadecimal format)
#
# Not: 
# - Hem alias hem de serial number belirtilirse önce alias denenir
# - Hiçbiri belirtilmezse keystore'daki ilk uygun sertifika kullanılır
# - Serial number hex formatında olmalıdır (örn: 4E7B8A92D13F5C6A)
# - Detaylı bilgi: docs/CERTIFICATE_SELECTION.md

# --- Sertifika Zinciri Yapılandırması ---
# CERTIFICATE_CHAIN_GET_ONLINE=true
# ISSUER_CERTIFICATE_PATH=/path/to/issuer.cer
# CA_CERTIFICATE_PATH=/path/to/ca.cer

# --- Guvenilir Kok Sertifika Resolver Konfigurasyonu ---
# Resolver tipi: "kamusm-online", "kamusm-offline" veya "certificate-folder"
# - kamusm-online: Internet uzerinden KamuSM XML deposunu yukler
# - kamusm-offline: Yerel dosya sisteminden KamuSM XML deposunu yukler
# - certificate-folder: Belirtilen klasordeki tum .crt/.cer dosyalarini yukler
trusted.root.resolver.type=${TRUSTED_ROOT_RESOLVER_TYPE:kamusm-online}

# --- KamuSM XML Depo Online Resolver ---
# KamuSM XML deposu URL'i (online resolver icin)
kamusm.root.url=${KAMUSM_ROOT_URL:http://depo.kamusm.gov.tr/depo/SertifikaDeposu.xml}

# --- Otomatik Yenileme Cron ---
# Tum resolver'lar icin ortak otomatik yenileme cron ifadesi
# Offline ve folder resolver'larda da calisir ancak basarisiz olursa onceki sertifikalar korunur
trusted.root.refresh-cron=${TRUSTED_ROOT_REFRESH_CRON:0 15 3 * * *}

# --- KamuSM XML Depo Offline Resolver ---
# KamuSM XML dosya yolu (offline resolver icin)
# Ornek: file:/path/to/SertifikaDeposu.xml veya classpath:kamusm/SertifikaDeposu.xml
kamusm.root.offline.path=${KAMUSM_ROOT_OFFLINE_PATH:}

# --- Certificate Folder Resolver ---
# Sertifika klasoru yolu (certificate-folder resolver icin)
# Bu klasordeki tum .crt, .cer ve .pem dosyalari guvenilir kok sertifika olarak yuklenir
# Ornek: file:/path/to/certificates veya /absolute/path/to/certificates
trusted.root.cert.folder.path=${TRUSTED_ROOT_CERT_FOLDER_PATH:}

# --- Imza Digest Algoritmasi (Opsiyonel Override) ---
# Default davranis: digest algoritmasi sertifikanin PUBLIC KEY parametresinden
# turetilir (EC icin curve buyuklugu, RSA icin SHA-256). Sertifikayi imzalayan
# CA'nin sigAlg'i (ornegin "SHA384withRSA") kasitli olarak yok sayilir.
#
# Operator belirli bir digest'i tum imzalama yollarinda (XAdES/CAdES/PAdES/
# WS-Security) zorlamak isterse asagidakileri kullanabilir. Kabul edilen
# degerler: SHA256, SHA384, SHA512, SHA224, SHA1 (tire/altcizgi opsiyonel).
#
# Bos birakildiginda (default) otomatik cozumleme calisir.
# signing.digest.algorithm=${SIGNING_DIGEST_ALGORITHM:}

# --- Zaman Damgası (Timestamp) Yapılandırması (Örnek) ---
# TS_SERVER_HOST=http://zd.kamusm.gov.tr
# TS_USER_ID=your-user-id
# TS_USER_PASSWORD=your-password
# TS_DIGEST_ALGORITHM=SHA-256
# IS_TUBITAK_TSP=true
#
# Not: TS_SERVER_HOST KamuSM zaman damgası endpoint'lerinden birine
#      (zd.kamusm.gov.tr veya tzd.kamusm.gov.tr) işaret ediyorsa
#      IS_TUBITAK_TSP otomatik olarak true kabul edilir; operatörün
#      bayrağı set etmeyi unutmasına karşı fail-safe.

# --- WS-Security Timestamp TTL ---
# WS-Security imzasındaki <wsu:Timestamp> elemanının yaşam süresi (saniye).
# Expires = Created + TTL. Set edilmediğinde varsayılan 60 saniyedir.
# WSSECURITY_TIMESTAMP_TTL_SECONDS=60

# --- XAdES SigningTime Timezone (issue #7) ---
# XAdES <SigningTime> elemanının XML çıktısında kullanılacak zaman dilimi.
# Default '+03:00' — TÜBİTAK MA3 referans çıktısı ve İMZAGER ile uyumlu.
# Diğer geçerli değerler:
#   Z, UTC, GMT       → ETSI saf yorumu (UTC 'Z' soneki)
#   +03:00, -05:30    → sabit ofset
#   Europe/Istanbul   → IANA bölge (DST destekli; Türkiye'de fark üretmez)
# XADES_SIGNING_TIME_ZONE=+03:00

# --- Performans Yapılandırması ---
# MAX_SESSION_COUNT → Eş zamanlı imza tavanı (tek-slider model).
#
# Uygulanma:
#   * Spring semaphore  → pipeline'a giriş bileti (PFX + HSM yollarında).
#   * IAIK PKCS11Token  → wrapper internal pool (sadece HSM yolunda).
#
# Aynı değer iki katmana da beslenir; mismatch riski yok.
# Default = 5 (muhafazakar; test/PFX için yeterli, HSM üretimi için düşük).
#
# Önerilen değerler (HSM tipine göre):
#   Akıllı kart / AKİS USB mali mühür  → 1   (PKCS11_NULL_INIT_ARGS=true zaten 1 forced)
#   SoftHSM2 (yük testi)               → 64
#   SafeNet Luna Network HSM           → 64-128
#   Thales ProtectServer / Utimaco     → 32-64
#
# NOT: ipkcs11wrapper 1.0.9, numSessions geçilmediğinde sessizce 32'de hard
# cap uygular. SignatureConfiguration MAX_SESSION_COUNT değerini explicit
# olarak wrapper'a geçirir; yani 256 set ederseniz gerçekten 256 olur
# (HSM tokenMaxSessionCount izin verdiği ölçüde).
#
# MAX_SESSION_COUNT=64

# CERTSTORE_PATH=SertifikaDeposu.svt

# ============================================================================
# Slack + Webhook Bildirim Yapılandırması (Environment Variables)
# ============================================================================
# İki tip olayda dış sistemlere fire-and-forget bildirim atılır:
#   1) signature-failure  — Herhangi bir imza endpoint'inde (XAdES/CAdES/PAdES/
#      WS-Security/Hash/Timestamp) exception. Request thread'inde tetiklendiği
#      için x-log-* header'ları payload'a + Slack mesajına dahil edilir.
#   2) heartbeat-*        — HSM heartbeat scheduler'ın state transition'ları
#      (failed, recovered, reinit-triggered, reinit-success, reinit-failed).
#      Scheduler thread'inde çalıştığı için x-log-* korelasyon boş gider.
#
# Aktivasyon kuralı: SIGNER_NOTIFICATION_ENABLED=true (default) iken yalnızca
# en az bir destination URL (webhook / Slack incoming webhook / Slack bot
# token+channel) set edildiğinde gerçek dispatch olur. Hiç destination yoksa
# OkHttpClient bile kurulmaz — heap maliyeti sıfır.
#
# İletişim modeli: TÜM dispatch'ler async ve best-effort. Bildirim hataları
# imza/heartbeat akışını ASLA bozmaz; yalnız WARN loglanır.
# ============================================================================

# --- Master + Event-seviye switch'ler ---
# SIGNER_NOTIFICATION_ENABLED=true                          # default true; false = topyekun susturma
# SIGNER_NOTIFICATION_SIGNATURE_FAILURE_ENABLED=true        # default true; sadece heartbeat istenirse false
# SIGNER_NOTIFICATION_HEARTBEAT_ENABLED=true                # default true; HSM yoksa zaten etkisiz

# --- Generic webhook (operatörün kendi alert/audit/ticket sistemi) ---
# JSON payload: SignerEventWebhookPayload (event, source, notificationTime,
# file?, signatureFailure?, heartbeat?, logHeaders?). HMAC header'ları:
# X-Mersel-Webhook-Id, X-Mersel-Webhook-Timestamp, X-Mersel-Event,
# X-Mersel-Signature: sha256=<hex>  (signingString = timestamp + "." + body).
# SIGNER_WEBHOOK_URL=
# SIGNER_WEBHOOK_SECRET=
# SIGNER_NOTIFICATION_INCLUDE_CONTENT=true              # default; PII varsa false
# SIGNER_NOTIFICATION_MAX_CONTENT_SIZE_BYTES=10485760   # default 10MB

# --- Slack incoming webhook (chat kanal mesajı; Block Kit) ---
# https://api.slack.com/messaging/webhooks adresinden alınan URL.
# SIGNER_SLACK_WEBHOOK_URL=

# --- Slack bot file upload (signature-failure dosyası kanala yüklensin) ---
# Heartbeat event'lerinde devreye girmez (dosya yok). 3-adımlı yeni Slack
# files API'si kullanılır; bot'a files:write scope verin.
# SIGNER_SLACK_BOT_TOKEN=xoxb-...
# SIGNER_SLACK_CHANNEL=C0123456789

# --- Slack inline base64 fallback (bot upload yoksa tek-URL dağıtım modu) ---
# SIGNER_SLACK_INLINE_BASE64_ENABLED=false              # default; bilinçli aç
# SIGNER_SLACK_INLINE_BASE64_MAX_BYTES=8192             # default 8KB

# --- HTTP timeouts ---
# SIGNER_NOTIFICATION_CONNECT_TIMEOUT_MS=5000           # default 5s
# SIGNER_NOTIFICATION_READ_TIMEOUT_MS=10000             # default 10s