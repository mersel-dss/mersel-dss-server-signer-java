# ─────────────────────────────────────────────────────────────────────────────
#  application-pfx-kurum01-rsa2048.properties — KamuSM testkurum01 RSA-2048
# ─────────────────────────────────────────────────────────────────────────────
#  Aktivasyon:
#    --spring.profiles.active=local,pfx-kurum01-rsa2048
#  (local profile network'i kapatır; bu dosya yalnızca cert override yapar)
#
#  IDE Run Configurations: .run/Signer - PFX RSA-2048 (KURUM01).run.xml
#                          .vscode/launch.json → "Signer :: PFX RSA-2048 (KURUM01)"
#
#  PIN convention'ı PfxTestKey enum'ında: '..._{password}.pfx' →
#  ..._614573.pfx → PIN=614573 (KamuSM tarafından publicly published).
# ─────────────────────────────────────────────────────────────────────────────

PFX_PATH=resources/test-certs/testkurum01_rsa2048@test.com.tr_614573.pfx
CERTIFICATE_PIN=614573
CERTIFICATE_ALIAS=1
