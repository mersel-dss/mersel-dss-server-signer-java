# ─────────────────────────────────────────────────────────────────────────────
#  application-local.properties — LOCAL/DEV/CI-snapshot profili
# ─────────────────────────────────────────────────────────────────────────────
#  Bu profile yalnızca aşağıdaki durumlarda aktif olur:
#
#    1) mvn spring-boot:run                         (pom.xml plugin config'inde)
#    2) java -jar ... --spring.profiles.active=local
#    3) SPRING_PROFILES_ACTIVE=local java -jar ...
#    4) IDE Run Configuration (IntelliJ/VS Code) — "Active Profiles: local"
#
#  PRODUCTION DEPLOYMENT'A SIZMAZ — production deployment'larında
#  `spring.profiles.active` set edilmediği için bu dosyadaki property'ler
#  hiç yüklenmez; PFX_PATH/CERTIFICATE_PIN gibi değerler yine zorunlu env
#  variable olarak prod-grade keystore'larla verilir.
#
#  Amaç: Geliştirici "git clone → mvn spring-boot:run" yaptığında uygulamanın
#  hemen ayağa kalkması, dummy env var setup'ı ile uğraşmasın. Aynı setup
#  GitHub Pages workflow'unda OpenAPI snapshot extraction'ında da kullanılır.
#
#  Profile composition (yeni — bkz. docs/RUN_PROFILES.md):
#    • Bu dosya "ortak ortam ayarları" (network kapalı, log seviyeleri vb.)
#      taşır ve default olarak KURUM01 RSA-2048 PFX'i seçer.
#    • Farklı PFX/HSM kullanmak istersen ek bir profile ile birlikte aktive
#      et — yeni profile'ın değerleri buradakileri override eder:
#         --spring.profiles.active=local,pfx-kurum02-ec384
#         --spring.profiles.active=local,mali-muhur-akis-mac
#    • IDE Run Configuration'ları (.run/, .vscode/launch.json) bu kombinasyonları
#      tek-tıkla hazır sunar; geliştirici manuel profile string'i girmez.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Test PFX (repo'daki KamuSM test keystore'u) ─────────────────────────────
# Üretim PFX'ine HİÇBİR durumda dönüşmez — sadece bu dosya yüklendiğinde
# (local profile aktif iken) referans alınır. Production'da prod PFX
# env variable ile geçilir, bu file de classpath'te kalır ama Spring
# tarafından okunmaz.
#
# PIN convention'ı PfxTestKey enum'ında: '..._{password}.pfx' →
# testkurum01_rsa2048@test.com.tr_614573.pfx → PIN=614573
PFX_PATH=resources/test-certs/testkurum01_rsa2048@test.com.tr_614573.pfx
CERTIFICATE_PIN=614573
CERTIFICATE_ALIAS=1

# ─── External servisleri kapat — local boot'ta network'e çıkmasın ─────────
# CertificateChainBuilderService online chain build yapmasın
CERTIFICATE_CHAIN_GET_ONLINE=false

# TUBITAK/KamuSM timestamp servisine bağlanmasın
IS_TUBITAK_TSP=false

# Trusted root resolver online KamuSM XML deposunu çekmesin — local'de
# offline mode + boş path → resolver "no-op" başlar, sadece test PFX
# zinciri kullanılır.
trusted.root.resolver.type=kamusm-offline
kamusm.root.offline.path=

# Refresh cron'u disable et — Spring 5.1+ "-" ile @Scheduled'ı no-op
# yapar. Aksi halde default cron (0 15 3 * * *) tetiklenir ve offline
# resolver yine path boş diye no-op kalır; iki seçenek de güvenli.
trusted.root.refresh-cron=-

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.io.mersel.dss.signer.api=DEBUG

# ─── Server port (override default 8085 if needed) ─────────────────────────
# server.port=8085
