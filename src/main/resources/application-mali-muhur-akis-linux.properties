# ─────────────────────────────────────────────────────────────────────────────
#  application-mali-muhur-akis-linux.properties — TÜBİTAK Mali Mühür AKİS Linux sürücüsü
# ─────────────────────────────────────────────────────────────────────────────
#  Aktivasyon:
#    --spring.profiles.active=local,mali-muhur-akis-linux
#
#  ÖN KOŞULLAR:
#    1) AKİS Linux sürücüsünün kurulu olması (apt/yum paketi veya KamuSM
#       resmi tar.gz). Default yol distribution'a göre değişebilir:
#         - Ubuntu/Debian: /usr/lib/x86_64-linux-gnu/libakisp11.so
#         - RHEL/Fedora:   /usr/lib64/libakisp11.so
#         - Manuel kurulum: /usr/local/lib/libakisp11.so
#    2) udev rule + pcscd servisinin çalışıyor olması (sistemctl status pcscd).
#    3) CCID-uyumlu kart okuyucu + akıllı kart takılı.
#    4) IDE Run Configuration env'sinde CERTIFICATE_PIN doldurulmuş olması.
# ─────────────────────────────────────────────────────────────────────────────

# Manuel kurulum default'u; distro paketi farklı yere koyduysa env ile override:
#   PKCS11_LIBRARY=/usr/lib/x86_64-linux-gnu/libakisp11.so
PKCS11_LIBRARY=/usr/local/lib/libakisp11.so

PKCS11_SLOT=-1
PKCS11_SLOT_LIST_INDEX=-1

# Linux AKİS sürücüsü standart C_Initialize'ı kabul eder; auto-detect zaten
# CKR_ARGUMENTS_BAD'da devreye girer. Operatör isterse explicit true verebilir.
PKCS11_NULL_INIT_ARGS=false

# CERTIFICATE_PIN, CERTIFICATE_ALIAS, CERTIFICATE_SERIAL_NUMBER → repo kökündeki
# `local-secrets.properties` dosyasından okunur (kart bağımlı, gitignored).
# Şablon için bkz. `local-secrets.properties.example` — kopyala, doldur, kullan:
#   cp local-secrets.properties.example local-secrets.properties
# Dosya yoksa Spring "optional:" prefix sayesinde sessizce devam eder; yoksa
# CERTIFICATE_PIN'siz boot @Value("${CERTIFICATE_PIN}") IllegalArgumentException
# fırlatır — operatör eksik dosyayı net görür.
spring.config.import=optional:file:./local-secrets.properties

MAX_SESSION_COUNT=1
