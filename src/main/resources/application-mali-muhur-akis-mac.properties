# ─────────────────────────────────────────────────────────────────────────────
#  application-mali-muhur-akis-mac.properties — TÜBİTAK Mali Mühür AKİS macOS sürücüsü
# ─────────────────────────────────────────────────────────────────────────────
#  Aktivasyon:
#    --spring.profiles.active=local,mali-muhur-akis-mac
#  (local profile network'i kapatır; bu dosya HSM yolunu kurar)
#
#  ÖN KOŞULLAR (operatör tarafında, IDE'ye girmeden):
#    1) TÜBİTAK BİLGEM AKİS macOS sürücüsünün kurulu olması
#       (Homebrew veya KamuSM resmi paketi).
#    2) Akıllı kart takılı + PIN biliniyor olması.
#    3) IDE Run Configuration env'sinde CERTIFICATE_PIN doldurulmuş olması.
#
#  AKİS PKCS#11 v2.40 §5.4 ile thread-unsafe sayıldığı için MAX_SESSION_COUNT=1
#  default'unda kalır; akıllı kart paralel oturum kaldırmadığından bu pratik
#  bir performans kaybı yaratmaz.
# ─────────────────────────────────────────────────────────────────────────────

# AKİS Homebrew/KamuSM default path (operatör farklıysa env ile override eder)
PKCS11_LIBRARY=/usr/local/lib/libakisp11.dylib

# Slot otomatik tespit: -1 → SunPKCS11 ilk uygun slot'u seçer.
# Üzerine yazmak için env: PKCS11_SLOT=1
PKCS11_SLOT=-1
PKCS11_SLOT_LIST_INDEX=-1

# AKİS macOS sürücüsü C_Initialize(CK_C_INITIALIZE_ARGS{flags=CKF_OS_LOCKING_OK})
# çağrısını reddeder; init args NULL'a fail-fast yönlendir.
PKCS11_NULL_INIT_ARGS=true

# CERTIFICATE_PIN, CERTIFICATE_ALIAS, CERTIFICATE_SERIAL_NUMBER → IDE Run
# Configuration env block'tan verilir; bu dosyaya yazılmaz (kart bağımlı).

# Tek oturum modu — AKİS thread-unsafe; aksi halde SIGSEGV alır.
MAX_SESSION_COUNT=1
