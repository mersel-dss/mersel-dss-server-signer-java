# ─────────────────────────────────────────────────────────────────────────────
#  application-mali-muhur-akis-windows.properties — TÜBİTAK Mali Mühür AKİS Windows sürücüsü
# ─────────────────────────────────────────────────────────────────────────────
#  Aktivasyon:
#    --spring.profiles.active=local,mali-muhur-akis-windows
#
#  ÖN KOŞULLAR:
#    1) AKİS Windows kurulu (KamuSM resmi installer); CSP veya PKCS#11 DLL
#       genelde C:\Windows\System32\akisp11.dll yoluna yerleşir.
#    2) Smart card servisi (SCardSvr) çalışıyor.
#    3) PC/SC-uyumlu kart okuyucu + akıllı kart takılı.
#    4) IDE Run Configuration env'sinde CERTIFICATE_PIN doldurulmuş olması.
#
#  Path separator notu: Java property dosyalarında '\\' ile escape edilmesi
#  gerekir. Forward slash '/' Windows'ta da Java tarafından kabul edildiği
#  için karışıklığa açık olmamak adına forward slash kullanılıyor.
# ─────────────────────────────────────────────────────────────────────────────

PKCS11_LIBRARY=C:/Windows/System32/akisp11.dll

PKCS11_SLOT=-1
PKCS11_SLOT_LIST_INDEX=-1

# Windows AKİS sürücüsü standart C_Initialize'ı kabul eder; ihtiyaç halinde
# env ile override:  PKCS11_NULL_INIT_ARGS=true
PKCS11_NULL_INIT_ARGS=false

MAX_SESSION_COUNT=1
